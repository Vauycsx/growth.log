/* ============ ANALYTICS ============ */
function renderAnalytics(){
  const cats = state.categories;
  const acts = state.activities;
  const owned = state.shopOwned || [];

  // ---- Weekly bar data (last 7 days)
  const days = [];
  for(let i=6;i>=0;i--){
    const d = new Date(); d.setDate(d.getDate()-i);
    const ds = d.toISOString().slice(0,10);
    const label = ['нд','пн','вт','ср','чт','пт','сб'][d.getDay()];
    const xp = acts.filter(a=>a.date===ds).reduce((s,a)=>s+a.xp,0);
    days.push({label, value: xp, date: ds});
  }
  const weekTotal = days.reduce((s,d)=>s+d.value,0);
  const weekMax   = Math.max(1,...days.map(d=>d.value));

  // ---- SVG: Weekly Bar Chart
  const BAR_W=30, GAP=8, H=90, PX=10, PY=10;
  const totalW = 7*(BAR_W+GAP)-GAP+PX*2;
  const barsSvg = days.map((d,i)=>{
    const barH = Math.max(2, Math.round((d.value/weekMax)*(H-16)));
    const x = PX + i*(BAR_W+GAP);
    const y = PY + H - 16 - barH;
    const isToday = d.date === new Date().toISOString().slice(0,10);
    return `
      <rect x="${x}" y="${y}" width="${BAR_W}" height="${barH}" rx="5"
        fill="${isToday?'var(--gold)':'var(--surface-3)'}" opacity="${d.value?1:0.5}"/>
      <text x="${x+BAR_W/2}" y="${PY+H-2}" text-anchor="middle"
        fill="${isToday?'var(--gold)':'var(--text-faint)'}" font-size="9" font-family="JetBrains Mono,monospace">${d.label}</text>
      ${d.value?`<text x="${x+BAR_W/2}" y="${Math.max(9,y-4)}" text-anchor="middle"
        fill="var(--text-dim)" font-size="8" font-family="JetBrains Mono,monospace">+${fmtXP(d.value)}</text>`:''}`;
  }).join('');

  // ---- SVG: Radar chart (unlockable)
  const hasRadar = owned.includes('chart_radar');
  let radarSvg = '';
  if(hasRadar && cats.length >= 2){
    const cx=130,cy=118,r=72,n=Math.min(cats.length,8);
    const maxXP = Math.max(1,...cats.slice(0,n).map(c=>c.xp));
    const gridLines=[0.25,0.5,0.75,1].map(ratio=>{
      const pts=Array.from({length:n},(_,i)=>{
        const a=(i*2*Math.PI/n)-Math.PI/2;
        return `${cx+r*ratio*Math.cos(a)},${cy+r*ratio*Math.sin(a)}`;
      }).join(' ');
      return `<polygon points="${pts}" fill="none" stroke="var(--border)" stroke-width="1"/>`;
    }).join('');
    const axisLines=Array.from({length:n},(_,i)=>{
      const a=(i*2*Math.PI/n)-Math.PI/2;
      return `<line x1="${cx}" y1="${cy}" x2="${cx+r*Math.cos(a)}" y2="${cy+r*Math.sin(a)}" stroke="var(--border)" stroke-width="1"/>`;
    }).join('');
    const dataPoints=cats.slice(0,n).map((c,i)=>{
      const ratio=c.xp/maxXP;
      const a=(i*2*Math.PI/n)-Math.PI/2;
      return `${cx+r*ratio*Math.cos(a)},${cy+r*ratio*Math.sin(a)}`;
    }).join(' ');
    const dots=cats.slice(0,n).map((c,i)=>{
      const ratio=c.xp/maxXP;
      const a=(i*2*Math.PI/n)-Math.PI/2;
      return `<circle cx="${cx+r*ratio*Math.cos(a)}" cy="${cy+r*ratio*Math.sin(a)}" r="4" fill="${c.color}"/>`;
    }).join('');
    const labels=cats.slice(0,n).map((c,i)=>{
      const a=(i*2*Math.PI/n)-Math.PI/2;
      const lr=r+24;
      const anchor=Math.cos(a)>0.15?'start':Math.cos(a)<-0.15?'end':'middle';
      const label = c.name.length>13 ? c.name.slice(0,12)+'…' : c.name;
      return `<text x="${cx+lr*Math.cos(a)}" y="${cy+lr*Math.sin(a)+4}" text-anchor="${anchor}"
        fill="${c.color}" font-size="10" font-family="JetBrains Mono,monospace" font-weight="700">${escapeHtml(label)}</text>`;
    }).join('');
    radarSvg=`<svg viewBox="0 0 260 236" class="chart-svg" style="overflow:visible">${gridLines}${axisLines}
      <polygon points="${dataPoints}" fill="var(--gold)" fill-opacity="0.18" stroke="var(--gold)" stroke-width="2"/>
      ${dots}${labels}</svg>`;
  }

  // ---- SVG: Donut chart (unlockable)
  const hasDonut = owned.includes('chart_donut');
  let donutSvg = '';
  if(hasDonut){
    const total=cats.reduce((s,c)=>s+c.xp,0);
    if(total===0){
      donutSvg=`<div style="text-align:center;padding:28px 0;color:var(--text-faint);font-size:13px;">Ще немає XP</div>`;
    } else {
      const used = cats.filter(c=>c.xp>0);
      const cx=85,cy=85,R=74,Ri=44;
      const ringR=(R+Ri)/2, strokeW=R-Ri;
      const circumference=2*Math.PI*ringR;
      let acc=0;
      const slices = used.map(c=>{
        const frac=c.xp/total;
        const segLen=frac*circumference;
        const gapPx = used.length>1 ? Math.min(3,segLen*0.08) : 0;
        const dash = Math.max(0,segLen-gapPx);
        const circle = `<circle cx="${cx}" cy="${cy}" r="${ringR}" fill="none" stroke="${c.color}"
          stroke-width="${strokeW}" stroke-linecap="${used.length>1?'round':'butt'}"
          stroke-dasharray="${dash.toFixed(2)} ${(circumference-dash).toFixed(2)}"
          stroke-dashoffset="${(-acc).toFixed(2)}" transform="rotate(-90 ${cx} ${cy})"/>`;
        acc += segLen;
        return circle;
      }).join('');
      const legendHtml = used.map(c=>{
        const pct = Math.round(c.xp/total*100);
        return `<div style="display:flex;align-items:center;gap:8px;padding:3px 0;">
          <div style="width:10px;height:10px;border-radius:3px;background:${c.color};flex-shrink:0;"></div>
          <div style="font-size:12px;color:var(--text);font-family:var(--mono);flex:1;text-align:left;">${escapeHtml(c.name)}</div>
          <div style="font-size:12px;color:var(--text-dim);font-family:var(--mono);white-space:nowrap;">${fmtXP(c.xp)} <span style="opacity:.65">(${pct}%)</span></div>
        </div>`;
      }).join('');
      donutSvg=`<div style="display:flex;align-items:center;justify-content:center;gap:20px;flex-wrap:wrap;">
        <svg viewBox="0 0 170 170" style="width:150px;height:150px;flex-shrink:0;overflow:visible;">
          <circle cx="${cx}" cy="${cy}" r="${ringR}" fill="none" stroke="var(--surface-3)" stroke-width="${strokeW}"/>
          ${slices}
          <circle cx="${cx}" cy="${cy}" r="${Ri-2}" fill="var(--surface-2)"/>
          <text x="${cx}" y="${cy-2}" text-anchor="middle" fill="var(--text)" font-size="16" font-weight="700" font-family="JetBrains Mono,monospace">${fmtXP(total)}</text>
          <text x="${cx}" y="${cy+14}" text-anchor="middle" fill="var(--text-faint)" font-size="8" font-family="JetBrains Mono,monospace">XP всього</text>
        </svg>
        <div style="min-width:130px;text-align:left;">${legendHtml}</div>
      </div>`;
    }
  }

  // ---- SVG: Trend line (unlockable, last 30 days cumulative)
  const hasTrend = owned.includes('chart_trend');
  let trendSvg = '';
  if(hasTrend){
    const pts30=Array.from({length:30},(_,i)=>{
      const d=new Date(); d.setDate(d.getDate()-(29-i));
      const ds=d.toISOString().slice(0,10);
      return acts.filter(a=>a.date===ds).reduce((s,a)=>s+a.xp,0);
    });
    let cum=0; const cumPts=pts30.map(v=>(cum+=v));
    const maxC=Math.max(1,...cumPts);
    const TW=260,TH=70,TOPPAD=22;
    const linePoints=cumPts.map((v,i)=>`${(i/(cumPts.length-1))*TW},${TOPPAD+TH-(v/maxC)*TH}`).join(' ');
    const areaPoints=`0,${TOPPAD+TH} ${linePoints} ${TW},${TOPPAD+TH}`;
    const lastY = TOPPAD+TH-(cumPts[29]/maxC)*TH;
    trendSvg=`<svg viewBox="-6 0 ${TW+12} ${TOPPAD+TH+20}" class="chart-svg" style="overflow:visible">
      <defs><linearGradient id="tg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="var(--teal)" stop-opacity="0.35"/>
        <stop offset="100%" stop-color="var(--teal)" stop-opacity="0"/>
      </linearGradient></defs>
      <polygon points="${areaPoints}" fill="url(#tg)"/>
      <polyline points="${linePoints}" fill="none" stroke="var(--teal)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="${TW}" y="${Math.max(10,lastY-8)}" text-anchor="end" fill="var(--teal)" font-size="10" font-weight="700" font-family="JetBrains Mono,monospace">${fmtXP(cumPts[29])} XP</text>
      <text x="0" y="${TOPPAD+TH+15}" fill="var(--text-faint)" font-size="8" font-family="JetBrains Mono,monospace">30 днів тому</text>
      <text x="${TW}" y="${TOPPAD+TH+15}" text-anchor="end" fill="var(--text-faint)" font-size="8" font-family="JetBrains Mono,monospace">сьогодні</text>
    </svg>`;
  }

  // ---- Activity by hour (last 30 days)
  const byHour=Array(24).fill(0);
  acts.slice(0,200).forEach(a=>{ const h=new Date(a.id.startsWith('a')?parseInt(a.id.slice(1)):Date.now()).getHours(); byHour[h]++; });
  const maxH=Math.max(1,...byHour);
  const hourDots=byHour.map((v,h)=>{
    const col=h<6||h>=22?'var(--violet)':h<12?'var(--blue)':h<18?'var(--gold)':'var(--coral)';
    return `<rect x="${h*13}" y="${28-Math.round((v/maxH)*26)}" width="11" height="${Math.max(2,Math.round((v/maxH)*26))}" rx="2" fill="${col}" opacity="${v?0.85:0.15}"/>`;
  }).join('');

  const lockCard=(id,iconName,name,price)=>`
    <div class="chart-card">
      <div class="chart-label">${ico(iconName,14)} ${name}</div>
      <div class="chart-locked">
        <div class="lock-icon">${ico('lock',26)}</div>
        <div>Розблокуй у Крамниці</div>
        <div style="font-size:12px;color:var(--gold);font-family:var(--mono);display:flex;align-items:center;justify-content:center;gap:5px;">${ico('coin',13)} ${price} монет</div>
        <button class="btn btn-primary btn-sm" style="margin-top:8px" onclick="activeTab='shop';render()">Відкрити крамницю</button>
      </div>
    </div>`;

  return `
    <div class="section-head"><h2>${ico('bar-chart',18)} Аналітика</h2></div>

    <div class="chart-grid">
      <div class="chart-card">
        <div class="chart-label">${ico('activity',14)} Тижневий XP</div>
        <svg viewBox="-${10} -${10} ${totalW+20} ${H+20}" class="chart-svg" style="overflow:visible">${barsSvg}</svg>
        <div style="font-size:11px;color:var(--text-faint);font-family:var(--mono);margin-top:6px;">За 7 днів: <b style="color:var(--gold)">${fmtXP(weekTotal)} XP</b></div>
      </div>

      ${hasRadar && cats.length>=2 ? `
        <div class="chart-card">
          <div class="chart-label">${ico('radar',14)} Баланс сфер</div>
          ${radarSvg}
        </div>` : lockCard('chart_radar','radar','Баланс сфер',60)}

      ${hasDonut ? `
        <div class="chart-card">
          <div class="chart-label">${ico('pie-chart',14)} Розподіл XP</div>
          ${donutSvg}
        </div>` : lockCard('chart_donut','pie-chart','Розподіл XP',90)}

      ${hasTrend ? `
        <div class="chart-card">
          <div class="chart-label">${ico('trending-up',14)} Ріст за 30 днів</div>
          ${trendSvg}
        </div>` : lockCard('chart_trend','trending-up','Ріст за 30 днів',120)}
    </div>

    <div class="chart-card" style="margin-bottom:16px;">
      <div class="chart-label">${ico('clock',14)} Активність по годинах</div>
      <svg viewBox="-4 -4 ${24*13+4} 44" class="chart-svg" style="overflow:visible">
        ${hourDots}
        <text x="0" y="40" fill="var(--text-faint)" font-size="7" font-family="JetBrains Mono,monospace">0:00</text>
        <text x="${12*13}" y="40" text-anchor="middle" fill="var(--text-faint)" font-size="7" font-family="JetBrains Mono,monospace">12:00</text>
        <text x="${23*13}" y="40" text-anchor="end" fill="var(--text-faint)" font-size="7" font-family="JetBrains Mono,monospace">23:00</text>
      </svg>
    </div>

    <div class="chart-card">
      <div class="chart-label">${ico('bar-chart',14)} Сфери</div>
      ${cats.length===0?`<div style="color:var(--text-faint);font-size:13px;text-align:center;padding:16px;">Немає сфер</div>`:''}
      ${cats.map(c=>{
        const lvl=calcLevel(c.xp);
        const pct=lvl.pct;
        return `<div style="margin-bottom:12px;">
          <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;">
            <span style="color:${c.color};font-weight:700;">${ico(c.icon,12)} ${escapeHtml(c.name)}</span>
            <span style="color:var(--text-faint);font-family:var(--mono);">Lv.${lvl.level} · ${c.xp} XP</span>
          </div>
          <div style="height:6px;background:var(--surface-3);border-radius:3px;overflow:hidden;">
            <div style="width:${pct}%;height:100%;background:${c.color};border-radius:3px;transition:width .4s;"></div>
          </div>
        </div>`;
      }).join('')}
    </div>
  `;
}

/* ============ PREVIEW ============ */
function previewItem(id){
  const item = SHOP_ITEMS.find(i=>i.id===id);
  if(!item) return;
  stopPreviewAnim();
  const isOwned = (state.shopOwned||[]).includes(id);
  const canAfford = (state.coins||0) >= item.price;
  const inner = avatarInnerHtml();

  // Resize modal based on type
  const modal = document.getElementById('previewModal');
  if(modal) modal.style.maxWidth = item.type==='theme' ? '580px' : '320px';

  document.getElementById('previewModalTitle').textContent = `preview / ${item.name}`;

  let body = '';
  if(item.type==='frame'){
    const size=88;
    const frameHtml = item.svg
      ? buildAvatarFrame(item.id, size, inner)
      : `<div class="avatar-btn frame-${item.cssClass}" style="pointer-events:none;">
           <div class="avatar-circle" style="width:${size}px;height:${size}px;font-size:26px;">${inner}</div>
         </div>`;
    body=`<div class="preview-frame-stage">${frameHtml}</div>
      <div class="preview-desc">${item.desc}</div>`;
  } else if(item.type==='theme'){
    const t=THEMES[item.themeKey];
    body=buildThemePreview(t, item);
    // Start canvas animation after DOM settles
    if(t.animBg){
      setTimeout(()=>{
        const cv=document.getElementById('previewAnimCanvas');
        if(cv) startPreviewAnim(t.animBg, cv);
      }, 60);
    }
  } else if(item.type==='chart'){
    body=`<div style="text-align:center;">
      <div style="background:var(--surface-2);border-radius:12px;padding:18px 12px 14px;margin-bottom:10px;">${buildChartPreview(item)}</div>
      <div style="font-size:13px;color:var(--text-dim);">${item.desc}</div>
    </div>`;
  }

  document.getElementById('previewModalBody').innerHTML = body;

  const btn=document.getElementById('previewActionBtn');
  if(isOwned){
    btn.textContent='apply'; btn.disabled=false; btn.style.opacity='1';
    btn.onclick=()=>{ equipItem(id, item.type, item.themeKey||''); closeModal('overlayPreview'); render(); };
  } else {
    btn.innerHTML=canAfford?`install ${ico('coin',13)} ${item.price}`:`locked ${ico('coin',13)} ${item.price}`;
    btn.disabled=!canAfford; btn.style.opacity=canAfford?'1':'0.4';
    btn.onclick=canAfford?()=>{ buyItem(id); closeModal('overlayPreview'); }:null;
  }
  openModal('overlayPreview');
}

// Sample data used in previews when the real account doesn't have enough
// data yet to make the visual meaningful (fresh accounts, 0 XP, etc.)
const DEMO_CHART_CATS = [
  {name:'Програмування', color:'#FF8B6B', xp:320},
  {name:'Робота',         color:'#5AA9FF', xp:210},
  {name:'Хобі',           color:'#9B8CFB', xp:140},
  {name:"Здоров'я",       color:'#45D6B0', xp:90},
];
const DEMO_WEEK_XP = [20,45,15,60,30,70,42];

function demoBadge(){
  return `<div style="position:absolute;top:8px;right:8px;font-size:8px;font-family:var(--mono);
    color:var(--text-faint);background:var(--surface-3);border:1px solid var(--border);
    padding:2px 7px;border-radius:5px;letter-spacing:.04em;">приклад</div>`;
}

function buildChartPreview(item){
  const realCats = state.categories;
  const acts = state.activities || [];

  if(item.id === 'chart_radar'){
    const usable = realCats.filter(c=>c.xp>0);
    const isDemo = usable.length < 2;
    const cats = isDemo ? DEMO_CHART_CATS : realCats;
    const cx=110,cy=95,r=70,n=Math.min(cats.length,8);
    const maxXP=Math.max(1,...cats.slice(0,n).map(c=>c.xp));
    const gridLines=[0.25,0.5,0.75,1].map(ratio=>{
      const pts=Array.from({length:n},(_,i)=>{const a=(i*2*Math.PI/n)-Math.PI/2; return `${cx+r*ratio*Math.cos(a)},${cy+r*ratio*Math.sin(a)}`;}).join(' ');
      return `<polygon points="${pts}" fill="none" stroke="var(--border)" stroke-width="1"/>`;
    }).join('');
    const axisLines=Array.from({length:n},(_,i)=>{const a=(i*2*Math.PI/n)-Math.PI/2; return `<line x1="${cx}" y1="${cy}" x2="${cx+r*Math.cos(a)}" y2="${cy+r*Math.sin(a)}" stroke="var(--border)" stroke-width="1"/>`;}).join('');
    const dataPoints=cats.slice(0,n).map((c,i)=>{const ratio=c.xp/maxXP; const a=(i*2*Math.PI/n)-Math.PI/2; return `${cx+r*ratio*Math.cos(a)},${cy+r*ratio*Math.sin(a)}`;}).join(' ');
    const dots=cats.slice(0,n).map((c,i)=>{const ratio=c.xp/maxXP; const a=(i*2*Math.PI/n)-Math.PI/2; return `<circle cx="${cx+r*ratio*Math.cos(a)}" cy="${cy+r*ratio*Math.sin(a)}" r="4" fill="${c.color}"/>`;}).join('');
    const labels=cats.slice(0,n).map((c,i)=>{const a=(i*2*Math.PI/n)-Math.PI/2; const lr=r+18; const anchor=Math.cos(a)>0.1?'start':Math.cos(a)<-0.1?'end':'middle'; return `<text x="${cx+lr*Math.cos(a)}" y="${cy+lr*Math.sin(a)+4}" text-anchor="${anchor}" fill="${c.color}" font-size="9" font-family="JetBrains Mono,monospace" font-weight="700">${escapeHtml(c.name.slice(0,9))}</text>`;}).join('');
    return `<div style="position:relative;">${isDemo?demoBadge():''}
      <svg viewBox="0 0 220 195" style="width:100%;max-width:280px;display:block;margin:0 auto;">${gridLines}${axisLines}
      <polygon points="${dataPoints}" fill="var(--gold)" fill-opacity="0.18" stroke="var(--gold)" stroke-width="2"/>
      ${dots}${labels}</svg></div>`;
  }

  if(item.id === 'chart_donut'){
    const realTotal = realCats.reduce((s,c)=>s+c.xp,0);
    const isDemo = realTotal===0;
    const cats = isDemo ? DEMO_CHART_CATS : realCats;
    const total = isDemo ? cats.reduce((s,c)=>s+c.xp,0) : realTotal;
    const used = cats.filter(c=>c.xp>0);
    const cx=110,cy=110,R=96,Ri=58;
    const ringR = (R+Ri)/2, strokeW = R-Ri;
    const circumference = 2*Math.PI*ringR;
    let acc=0;
    const slices = used.map(c=>{
      const frac = c.xp/total;
      const segLen = frac*circumference;
      const gapPx = used.length>1 ? Math.min(3, segLen*0.08) : 0;
      const dash = Math.max(0, segLen-gapPx);
      const circle = `<circle cx="${cx}" cy="${cy}" r="${ringR}" fill="none" stroke="${c.color}"
        stroke-width="${strokeW}" stroke-linecap="${used.length>1?'round':'butt'}"
        stroke-dasharray="${dash.toFixed(2)} ${(circumference-dash).toFixed(2)}"
        stroke-dashoffset="${(-acc).toFixed(2)}"
        transform="rotate(-90 ${cx} ${cy})"/>`;
      acc += segLen;
      return circle;
    }).join('');
    const legendHtml = used.map(c=>{
      const pct = Math.round(c.xp/total*100);
      return `<div style="display:flex;align-items:center;gap:9px;padding:5px 0;">
        <div style="width:12px;height:12px;border-radius:3px;background:${c.color};flex-shrink:0;"></div>
        <div style="font-size:13px;color:var(--text);font-family:var(--mono);flex:1;text-align:left;">${escapeHtml(c.name)}</div>
        <div style="font-size:13px;color:var(--text-dim);font-family:var(--mono);white-space:nowrap;">${c.xp} <span style="opacity:.65">(${pct}%)</span></div>
      </div>`;
    }).join('');
    return `<div style="position:relative;">${isDemo?demoBadge():''}
      <div style="display:flex;align-items:center;justify-content:center;gap:28px;flex-wrap:wrap;">
        <svg viewBox="0 0 220 220" style="width:190px;height:190px;flex-shrink:0;">
          <circle cx="${cx}" cy="${cy}" r="${ringR}" fill="none" stroke="var(--surface-3)" stroke-width="${strokeW}"/>
          ${slices}
          <circle cx="${cx}" cy="${cy}" r="${Ri-2}" fill="var(--surface-2)"/>
          <text x="${cx}" y="${cy-4}" text-anchor="middle" fill="#fff" font-size="24" font-weight="700" font-family="JetBrains Mono,monospace">${total}</text>
          <text x="${cx}" y="${cy+17}" text-anchor="middle" fill="var(--text-faint)" font-size="11" font-family="JetBrains Mono,monospace">XP всього</text>
        </svg>
        <div style="min-width:180px;text-align:left;">${legendHtml}</div>
      </div>
    </div>`;
  }

  if(item.id === 'chart_trend'){
    const realPts30=Array.from({length:30},(_,i)=>{
      const d=new Date(); d.setDate(d.getDate()-(29-i));
      const ds=d.toISOString().slice(0,10);
      return acts.filter(a=>a.date===ds).reduce((s,a)=>s+a.xp,0);
    });
    const isDemo = realPts30.every(v=>v===0);
    const pts30 = isDemo
      ? Array.from({length:30},(_,i)=>Math.round(15+25*Math.sin(i/4.2)+i*1.4+(i%5===0?20:0)))
      : realPts30;
    let cum=0; const cumPts=pts30.map(v=>(cum+=Math.max(0,v)));
    const maxC=Math.max(1,...cumPts);
    const TW=260,TH=70;
    const linePoints=cumPts.map((v,i)=>`${(i/(cumPts.length-1))*TW},${TH-(v/maxC)*TH}`).join(' ');
    const areaPoints=`0,${TH} ${linePoints} ${TW},${TH}`;
    return `<div style="position:relative;">${isDemo?demoBadge():''}
      <svg viewBox="-4 -8 ${TW+8} ${TH+20}" style="width:100%;max-width:280px;display:block;margin:0 auto;">
      <defs><linearGradient id="tgPrev" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="var(--teal)" stop-opacity="0.35"/>
        <stop offset="100%" stop-color="var(--teal)" stop-opacity="0"/>
      </linearGradient></defs>
      <polygon points="${areaPoints}" fill="url(#tgPrev)"/>
      <polyline points="${linePoints}" fill="none" stroke="var(--teal)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="0" y="${TH+14}" fill="var(--text-faint)" font-size="8" font-family="JetBrains Mono,monospace">30 днів тому</text>
      <text x="${TW}" y="${TH+14}" text-anchor="end" fill="var(--text-faint)" font-size="8" font-family="JetBrains Mono,monospace">сьогодні</text>
      <text x="${TW}" y="${TH-(cumPts[29]/maxC)*TH-5}" text-anchor="end" fill="var(--teal)" font-size="9" font-family="JetBrains Mono,monospace">${cumPts[29]} XP</text>
    </svg></div>`;
  }

  return '';
}

function buildThemePreview(t, item){
  const lvl=calcLevel(totalXP(state)), streak=calcStreak(state);
  const hasAnim=!!t.animBg;
  const equippedFrame = state.shopEquipped?.frame || null;
  const avatarHtml = buildAvatarFrame(equippedFrame, 32, avatarInnerHtml());

  // category bars — fall back to demo fill if real categories have no XP yet
  const realCats = state.categories.slice(0,4);
  const realHasXp = realCats.some(c=>c.xp>0);
  const isDemoCats = !realHasXp;
  const DEMO_PCT=[82,58,40,25];
  const cats = realCats.length ? realCats : DEMO_CHART_CATS;
  const maxXp=Math.max(1,...realCats.map(c=>c.xp));

  // mini weekly xp chart (theme-colored) — demo curve if nothing logged this week
  const acts = state.activities || [];
  const todayStr = new Date().toISOString().slice(0,10);
  const realDays=[];
  for(let i=6;i>=0;i--){
    const d=new Date(); d.setDate(d.getDate()-i);
    const ds=d.toISOString().slice(0,10);
    realDays.push({ds, value: acts.filter(a=>a.date===ds).reduce((s,a)=>s+a.xp,0)});
  }
  const isDemoWeek = realDays.every(d=>d.value===0);
  const days = isDemoWeek ? realDays.map((d,i)=>({...d, value:DEMO_WEEK_XP[i]})) : realDays;
  const maxDay=Math.max(1,...days.map(d=>d.value));
  const CH=44;
  const chartBars = days.map((d,i)=>{
    const pct=Math.max(5,Math.round((d.value/maxDay)*100));
    const isToday = d.ds===todayStr && !isDemoWeek;
    return `<div style="flex:1;display:flex;align-items:flex-end;height:${CH}px;">
      <div style="width:100%;height:${pct}%;border-radius:4px;background:${isToday?t.gold:t.teal};opacity:${isToday?1:.6};"></div>
    </div>`;
  }).join('');

  return `
    <div style="position:relative;border-radius:14px;overflow:hidden;border:1px solid ${t.border};box-shadow:0 10px 34px #00000060;margin-bottom:10px;min-height:min(62vh,560px);display:flex;flex-direction:column;">
      ${hasAnim?`<canvas id="previewAnimCanvas" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;"></canvas>`:''}
      <div style="position:relative;z-index:1;display:flex;flex-direction:column;flex:1;">
        <!-- Topbar -->
        <div style="background:${t.surface}f2;border-bottom:1px solid ${t.border};padding:10px 14px;display:flex;align-items:center;gap:10px;backdrop-filter:blur(6px);">
          <span style="color:${t.gold};font-size:12px;font-weight:700;font-family:monospace;letter-spacing:.04em;">growth.log</span>
          <div style="flex:1"></div>
          <div style="background:${t.gold}22;border:1px solid ${t.gold}44;padding:3px 10px;border-radius:7px;color:${t.gold};font-size:10px;font-family:monospace;">Lv.${lvl.level}</div>
          <div style="flex-shrink:0;display:flex;align-items:center;">${avatarHtml}</div>
        </div>
        <!-- Content -->
        <div style="padding:13px 14px;display:grid;grid-template-columns:1fr 1fr;gap:9px;align-content:start;background:${t.bg}e6;backdrop-filter:blur(3px);flex:1;">
          <div style="background:${t.surface}d9;border:1px solid ${t.border};border-radius:10px;padding:11px;">
            <div style="color:${t.teal};font-size:9px;font-family:monospace;margin-bottom:5px;letter-spacing:.04em;">◈ xp total</div>
            <div style="color:${t.gold};font-size:18px;font-weight:700;font-family:monospace;">${totalXP(state)}</div>
            <div style="height:4px;background:${t.surface3};border-radius:2px;margin-top:8px;overflow:hidden;">
              <div style="height:100%;width:${lvl.pct}%;background:${t.gold};border-radius:2px;"></div>
            </div>
          </div>
          <div style="background:${t.surface}d9;border:1px solid ${t.border};border-radius:10px;padding:11px;">
            <div style="color:${t.violet};font-size:9px;font-family:monospace;margin-bottom:5px;letter-spacing:.04em;">◉ streak</div>
            <div style="color:${t.violet};font-size:18px;font-weight:700;font-family:monospace;">${streak}<span style="font-size:10px;opacity:.7"> days</span></div>
            <div style="font-size:9px;color:${t.border};margin-top:8px;font-family:monospace;overflow:hidden;">──────────</div>
          </div>
          <div style="background:${t.surface}d9;border:1px solid ${t.border};border-radius:10px;padding:11px 11px 8px;grid-column:1/-1;">
            <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;">
              <span style="color:${t.coral};font-size:9px;font-family:monospace;letter-spacing:.04em;">▴ тиждень xp</span>
              <span style="color:${t.gold};font-size:8px;font-family:monospace;opacity:.7;">${isDemoWeek?'приклад':'7д'}</span>
            </div>
            <div style="display:flex;gap:6px;">${chartBars}</div>
          </div>
          <div style="background:${t.surface}d9;border:1px solid ${t.border};border-radius:10px;padding:11px;grid-column:1/-1;position:relative;">
            ${isDemoCats?`<span style="position:absolute;top:9px;right:11px;font-size:8px;font-family:monospace;color:${t.gold};opacity:.7;">приклад</span>`:''}
            ${cats.map((c,i)=>{
              const pct = isDemoCats ? (DEMO_PCT[i]||DEMO_PCT[i%4]) : Math.min(100,Math.round(c.xp/maxXp*100));
              return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px;">
              <div style="width:6px;height:6px;border-radius:50%;background:${c.color};flex-shrink:0;"></div>
              <div style="font-size:9px;color:${t.teal};font-family:monospace;flex:1;overflow:hidden;white-space:nowrap;">${escapeHtml(c.name)}</div>
              <div style="height:4px;background:${t.surface3};border-radius:2px;flex:2;overflow:hidden;">
                <div style="height:100%;width:${pct}%;background:${c.color};border-radius:2px;"></div>
              </div>
              <div style="font-size:9px;color:${t.gold};min-width:28px;text-align:right;font-family:monospace;">${isDemoCats?c.xp:c.xp}</div>
            </div>`;}).join('')}
          </div>
        </div>
        <!-- Tabs -->
        <div style="background:${t.surface}f2;border-top:1px solid ${t.border};padding:6px 14px;display:flex;gap:6px;backdrop-filter:blur(6px);">
          ${['Огляд','Аналітика','Таймер','~/store'].map((l,i)=>`<div style="font-size:9px;padding:3px 8px;border-radius:5px;font-family:monospace;white-space:nowrap;${i===0?`background:${t.gold}28;color:${t.gold};border:1px solid ${t.gold}44;`:`color:${t.border};`}">${l}</div>`).join('')}
        </div>
      </div>
    </div>
    <div class="preview-desc" style="text-align:center;">${t.name}${hasAnim?' · animated background':''} — ${item.desc}</div>`;
}

/* ============ SHOP ============ */
function renderShop(){
  const owned    = state.shopOwned    || [];
  const equipped = state.shopEquipped || {};
  const coins    = state.coins || 0;

  const framePreview = (item) => {
    const inner = `<span style="font-size:9px;opacity:.7;">◈</span>`;
    if(item.svg && item.id){
      return `<div class="frame-preview-wrap" style="pointer-events:none;width:54px;height:54px;overflow:visible;">${buildAvatarFrame(item.id, 28, inner)}</div>`;
    }
    const cls = item.cssClass || item.id?.replace('frame_','');
    return `<div class="frame-preview-wrap"><div class="avatar-btn ${cls?'frame-'+cls:''}" style="pointer-events:none;">
      <div class="avatar-circle" style="width:28px;height:28px;font-size:9px;border-width:2px;">◈</div>
    </div></div>`;
  };

  const themePreview = (item) => {
    const t = THEMES[item.themeKey] || {};
    return `<div style="width:28px;height:28px;border-radius:50%;flex-shrink:0;overflow:hidden;border:1.5px solid ${t.border||'#333'};">
      <div style="height:50%;background:${t.bg||'#111'};"></div>
      <div style="height:50%;background:${t.gold||'#888'};opacity:.8;"></div>
    </div>`;
  };

  const rows = (items) => items.map(item=>{
    const isOwned  = owned.includes(item.id);
    const isActive = equipped.frame === item.id
      || (item.type==='theme' && state.profile?.theme === item.themeKey && isOwned);
    const canAfford = coins >= item.price;

    let tag = '';
    if(isActive)     tag = `<span class="shop-row-tag sr-tag-active">active</span>`;
    else if(isOwned) tag = `<span class="shop-row-tag sr-tag-owned">owned</span>`;

    let action = '';
    if(isActive){
      action = `<button class="btn btn-ghost btn-sm" style="font-size:11px;" onclick="unequipItem('${item.id}','${item.type}')">unset</button>`;
    } else if(isOwned){
      action = `<button class="btn btn-primary btn-sm" style="font-size:11px;" onclick="equipItem('${item.id}','${item.type}','${item.themeKey||''}')">apply</button>`;
    } else {
      action = canAfford
        ? `<button class="btn btn-primary btn-sm" style="font-size:11px;" onclick="buyItem('${item.id}')">install</button>`
        : `<button class="btn btn-ghost btn-sm" style="font-size:11px;opacity:.4;" disabled>locked</button>`;
    }
    const previewBtn = `<button class="btn btn-ghost btn-sm" style="font-size:11px;margin-right:4px;" onclick="previewItem('${item.id}')">preview</button>`;
    const giftBtn = `<button class="btn btn-ghost btn-sm" style="font-size:11px;margin-right:4px;padding:5px 8px;" title="Подарувати другу" onclick="openGiftItemModal('${item.id}')">${ico('gem',13)}</button>`;

    const preview = item.type==='theme' ? themePreview(item) : framePreview(item);
    const animTag = item.animated ? `<span style="font-size:8px;color:var(--teal);font-family:var(--mono);padding:1px 5px;border:1px solid var(--teal)33;border-radius:3px;flex-shrink:0;">anim</span>` : '';

    return `<div class="shop-row ${isOwned?'sr-owned':''} ${isActive?'sr-active':''}">
      ${preview}
      <div class="shop-row-name">${item.name}</div>
      <div class="shop-row-desc">${item.desc}</div>
      ${animTag}
      ${tag}
      ${!isOwned ? `<div class="shop-row-price" style="display:flex;align-items:center;gap:4px;">${ico('coin',13)} ${item.price}</div>` : '<div style="min-width:54px"></div>'}
      <div style="display:flex;align-items:center;">${previewBtn}${giftBtn}${action}</div>
    </div>`;
  }).join('');

  const section = (label, items) => `
    <div class="shop-section">
      <div class="shop-section-hd">${label}</div>
      <div class="shop-list">${rows(items)}</div>
    </div>`;

  return `
    <div class="section-head">
      <h2 style="font-family:var(--mono);font-size:15px;letter-spacing:.02em;">~/store</h2>
      <div class="coin-pill" style="display:flex;align-items:center;gap:5px;">${ico('coin',14)} ${coins}</div>
    </div>
    <div class="card" style="margin-bottom:16px;padding:12px 16px;font-family:var(--mono);font-size:11px;color:var(--text-dim);line-height:1.8;">
      <span style="color:var(--text-faint)"># earn </span>~1 ${ico('coin',11)} per 15 xp · <span style="color:var(--text-faint)"># levelup </span><span style="color:var(--gold)">level × 25 ${ico('coin',11)}</span> bonus
    </div>
    ${section('themes // premium', SHOP_ITEMS.filter(i=>i.type==='theme'))}
    ${section('avatar.frames', SHOP_ITEMS.filter(i=>i.type==='frame'))}
    ${section('analytics.charts', SHOP_ITEMS.filter(i=>i.type==='chart'))}
  `;
}

function buyItem(id){
  const item = SHOP_ITEMS.find(i=>i.id===id);
  if(!item) return;
  if((state.coins||0) < item.price){ showToast(`insufficient coins (need ${item.price})`); return; }
  if(!state.shopOwned) state.shopOwned=[];
  if(state.shopOwned.includes(id)){ showToast('already installed'); return; }
  state.coins -= item.price;
  state.shopOwned.push(id);
  saveState();
  showToast(`installed: ${item.name}`);
  render();
}

function equipItem(id, type, themeKey){
  if(!state.shopEquipped) state.shopEquipped={};
  if(type==='frame'){
    state.shopEquipped.frame = id;
  } else if(type==='theme' && themeKey){
    state.profile.theme = themeKey;
    applyTheme(themeKey);
  }
  saveState();
  renderTopbar();
  render();
}

function unequipItem(id, type){
  if(!state.shopEquipped) state.shopEquipped={};
  if(type==='frame') state.shopEquipped.frame = null;
  else if(type==='theme'){
    state.profile.theme='dark';
    applyTheme('dark');
  }
  saveState();
  renderTopbar();
  render();
}

function showToast(msg){
  const t=document.createElement('div');
  t.className='toast';
  t.innerHTML=`<div>${msg}</div>`;
  t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:300;white-space:nowrap;';
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2800);
}

function exportData(){
  const blob = new Blob([JSON.stringify(state,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `growth-log-${todayStr()}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const parsed = JSON.parse(reader.result);
      if(parsed.categories && parsed.quests){
        state = parsed;
        if(!state.timer) state.timer = {running:false, categoryId:null, title:'', startedAt:null};
        saveState();
        render();
        alert('Прогрес імпортовано!');
      } else alert('Файл має невірний формат.');
    }catch(err){ alert('Не вдалося прочитати файл.'); }
  };
  reader.readAsText(file);
}

async function resetAll(){
  if(!confirm('Це видалить ВЕСЬ прогрес назавжди — і локально, і в хмарі. Продовжити?')) return;
  // Wipe server-side data first
  if(sb && sbSession){
    const {error} = await sb.rpc('reset_all_user_data');
    if(error){ showToast('Помилка очищення хмари: '+error.message); return; }
  }
  state = defaultState();
  if(sbProfile) sbProfile = {...sbProfile, level:1, total_xp:0, streak:0, coins:0};
  await storageSet('state', JSON.stringify(state));
  render();
  showToast('Прогрес скинуто');
}

/* ============ THEME ============ */
function applyTheme(key){
  const t = THEMES[key] || THEMES.dark;
  const r = document.documentElement;
  r.style.setProperty('--bg', t.bg);
  r.style.setProperty('--surface', t.surface);
  r.style.setProperty('--surface-2', t.surface2);
  r.style.setProperty('--surface-3', t.surface3);
  r.style.setProperty('--border', t.border);
  r.style.setProperty('--gold', t.gold);
  r.style.setProperty('--teal', t.teal);
  r.style.setProperty('--violet', t.violet);
  r.style.setProperty('--coral', t.coral);
  r.style.setProperty('--blue', t.blue);
  r.style.setProperty('--pink', t.pink);
  r.style.setProperty('--red', t.red);
  if(t.animBg) startAnimBg(t.animBg);
  else stopAnimBg();
}

/* ============ PROFILE MODAL ============ */
function renderProfileAccountSection(){
  const box = document.getElementById('profileAccountSection');
  if(!box) return;
  if(!sb || !sbSession){
    box.innerHTML = `<div style="font-size:12px;color:var(--text-faint);">Акаунт недоступний.</div>`;
    return;
  }
  box.innerHTML = `<div style="display:flex;align-items:center;justify-content:space-between;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;">
    <div>
      <div style="font-weight:700;font-size:13px;">${escapeHtml(sbProfile?.nickname || sbSession.user.email)}</div>
      <div style="font-size:11px;color:var(--text-faint);">${escapeHtml(sbSession.user.email)}</div>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="sbLogoutSubmit()">${ico('x',13)} Вийти</button>
  </div>`;
}

function openProfileModal(){
  if(!state.profile) state.profile = {nick:'', avatar:null, theme:'dark'};
  if(!state.profile.nick && sbProfile?.nickname){
    state.profile.nick = sbProfile.nickname;
    saveState();
  }
  tempAvatar = state.profile.avatar || null;
  pickedTheme = state.profile.theme || 'dark';
  document.getElementById('profileModalTitle').innerHTML = ico('user',18)+' Мій профіль';
  document.getElementById('profileNickInput').value = state.profile.nick || '';
  updateAvatarPreview();
  renderThemeSwatches(pickedTheme);
  renderProfileFramePicker();
  renderProfileAccountSection();
  openModal('overlayProfile');
}

function renderProfileFramePicker(){
  const picker = document.getElementById('profileFramePicker');
  if(!picker) return;
  const owned = (state.shopOwned||[]).filter(id=>id.startsWith('frame_'));
  const currentFrame = state.shopEquipped?.frame || null;
  const inner = avatarInnerHtml();

  if(!owned.length){
    picker.innerHTML = `<div style="font-size:11px;color:var(--text-faint);font-family:var(--mono);padding:4px 0;">
      no frames owned — <span style="color:var(--gold);cursor:pointer;" onclick="closeModal('overlayProfile');activeTab='shop';render();">open ~/store</span>
    </div>`;
    return;
  }

  const frameItems = [
    {id:null, name:'none', cssClass:null, svg:false},
    ...SHOP_ITEMS.filter(i=>i.type==='frame' && owned.includes(i.id))
  ];

  picker.innerHTML = frameItems.map(item=>{
    const isActive = currentFrame === item.id;
    const cls = item.cssClass || (item.id ? item.id.replace('frame_','') : null);
    let html;
    if(item.svg && item.id){
      html = buildAvatarFrame(item.id, 36, inner);
    } else {
      html = `<div class="${cls?'avatar-btn frame-'+cls:''}" style="pointer-events:none;">
        <div class="avatar-circle" style="width:36px;height:36px;font-size:12px;">${inner}</div>
      </div>`;
    }
    return `<div class="frame-pick-item ${isActive?'fp-active':''}" onclick="profilePickFrame('${item.id||''}')">
      <div style="pointer-events:none;">${html}</div>
      <div class="frame-pick-label">${item.name||'none'}</div>
    </div>`;
  }).join('');
}

function profilePickFrame(id){
  if(!state.shopEquipped) state.shopEquipped={};
  state.shopEquipped.frame = id || null;
  saveState();
  renderProfileFramePicker();
  updateAvatarPreview();
  renderTopbar();
}

function updateAvatarPreview(){
  const zone = document.getElementById('avatarUploadZone');
  if(!zone) return;
  const inner = tempAvatar
    ? `<img src="${tempAvatar}" alt="avatar">`
    : `<div style="display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--text-dim);font-size:11px;">${ico('camera',22)}<span>Завантажити</span></div>`;
  zone.innerHTML = buildAvatarFrame(state.shopEquipped?.frame || null, 88, inner);
}

function clearAvatar(){
  tempAvatar = null;
  updateAvatarPreview();
}

function handleAvatarUpload(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{ tempAvatar = reader.result; updateAvatarPreview(); };
  reader.readAsDataURL(file);
  e.target.value = '';
}

const PREMIUM_THEME_KEYS = ['inferno', 'galaxy', 'mono', 'nightsky', 'digital', 'blossom'];

/* ============ ANIMATED BACKGROUND ============ */
let _bgRaf = null, _bgType = null;

function startAnimBg(type){
  if(_bgRaf){ cancelAnimationFrame(_bgRaf); _bgRaf=null; }
  let cv = document.getElementById('bgCanvas');
  if(!cv){
    cv = document.createElement('canvas');
    cv.id = 'bgCanvas';
    cv.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:-1;';
    document.body.insertBefore(cv, document.body.firstChild);
  }
  cv.width = window.innerWidth; cv.height = window.innerHeight;
  cv.style.display = 'block'; cv.style.opacity = '1';
  _bgType = type;
  const ctx = cv.getContext('2d');

  if(type === 'stars'){
    const stars = Array.from({length:200}, ()=>({
      x: Math.random()*cv.width, y: Math.random()*cv.height,
      r: Math.random()*1.3+0.2, vy: -(Math.random()*.35+.04),
      tw: Math.random()*Math.PI*2, ts: Math.random()*.018+.007
    }));
    (function draw(){
      if(_bgType!=='stars') return;
      ctx.clearRect(0,0,cv.width,cv.height);
      stars.forEach(s=>{
        s.tw+=s.ts; s.y+=s.vy;
        if(s.y<0){ s.y=cv.height; s.x=Math.random()*cv.width; }
        const a=.15+.4*Math.abs(Math.sin(s.tw));
        ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(180,200,255,${a})`; ctx.fill();
      });
      _bgRaf=requestAnimationFrame(draw);
    })();
  } else if(type === 'rain'){
    const cols = Math.ceil(cv.width/13);
    const drops = Array.from({length:cols},()=>-(Math.random()*cv.height));
    const chars='01アイウエカキサシスタチナニハヒフヘラリルレロ';
    ctx.font='11px JetBrains Mono,monospace';
    (function draw(){
      if(_bgType!=='rain') return;
      ctx.fillStyle='rgba(7,14,6,.12)'; ctx.fillRect(0,0,cv.width,cv.height);
      drops.forEach((y,i)=>{
        const ch=chars[Math.floor(Math.random()*chars.length)];
        const alpha=Math.random()>.6?.55:.2;
        ctx.fillStyle=`rgba(127,224,133,${alpha})`;
        ctx.fillText(ch, i*13, y);
        if(y>cv.height && Math.random()>.96) drops[i]=-20;
        else drops[i]+=13;
      });
      _bgRaf=requestAnimationFrame(draw);
    })();
  } else if(type==='sakura'){
    const petals=Array.from({length:38},()=>({
      x:Math.random()*cv.width, y:Math.random()*cv.height-cv.height*.3,
      vy:Math.random()*.55+.2, vx:Math.random()*.25-.12,
      rot:Math.random()*Math.PI*2, rotV:(Math.random()-.5)*.022,
      size:Math.random()*3+2.5,
      col:['#FFB3D6','#FFC4E0','#FF9EC6','#FFAAD0','#FFD4EB'][Math.floor(Math.random()*5)]
    }));
    (function draw(){
      if(_bgType!=='sakura') return;
      ctx.clearRect(0,0,cv.width,cv.height);
      petals.forEach(p=>{
        p.y+=p.vy; p.x+=p.vx+Math.sin(p.y*.013)*.35; p.rot+=p.rotV;
        if(p.y>cv.height+20){p.y=-12;p.x=Math.random()*cv.width;}
        ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
        ctx.beginPath(); ctx.ellipse(0,0,p.size*.5,p.size,0,0,Math.PI*2);
        ctx.fillStyle=p.col; ctx.globalAlpha=.52; ctx.fill(); ctx.restore();
      });
      _bgRaf=requestAnimationFrame(draw);
    })();
  }
}

function stopPreviewAnim(){

    const stars=Array.from({length:count},()=>({
      x:Math.random()*canvas.width,y:Math.random()*canvas.height,
      r:Math.random()*.9+.2,vy:-(Math.random()*.2+.04),
      tw:Math.random()*Math.PI*2,ts:Math.random()*.016+.006
    }));
    (function draw(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      stars.forEach(s=>{
        s.tw+=s.ts; s.y+=s.vy;
        if(s.y<0){s.y=canvas.height;s.x=Math.random()*canvas.width;}
        const a=.18+.45*Math.abs(Math.sin(s.tw));
        ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(180,200,255,${a})`;ctx.fill();
      });

    ctx.font='10px monospace';
    (function draw(){
      ctx.fillStyle='rgba(7,14,6,.13)';ctx.fillRect(0,0,canvas.width,canvas.height);
      drops.forEach((y,i)=>{
        ctx.fillStyle=`rgba(127,224,133,${Math.random()>.6?.45:.17})`;
        ctx.fillText(chars[Math.floor(Math.random()*chars.length)],i*13,y);
        if(y>canvas.height&&Math.random()>.96)drops[i]=-20;else drops[i]+=13;
      });
      _prvRaf=requestAnimationFrame(draw);
    })();
  } else if(type==='sakura'){
    const area = canvas.width*canvas.height;
    const count = Math.max(26, Math.round(area/6500));
    const petals=Array.from({length:count},()=>({
      x:Math.random()*canvas.width,y:Math.random()*canvas.height-30,
      vy:Math.random()*.55+.22,vx:Math.random()*.28-.14,
      rot:Math.random()*Math.PI*2,rotV:(Math.random()-.5)*.025,
      size:Math.random()*4.5+4,
      col:['#FFB3D6','#FFC4E0','#FF9EC6','#FFAAD0','#FFD4EB'][Math.floor(Math.random()*5)]
    }));
    (function draw(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      petals.forEach(p=>{
        p.y+=p.vy;p.x+=p.vx+Math.sin(p.y*.015)*.35;p.rot+=p.rotV;
        if(p.y>canvas.height+15){p.y=-10;p.x=Math.random()*canvas.width;}
        ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);
        ctx.shadowColor=p.col;ctx.shadowBlur=5;
        ctx.beginPath();ctx.ellipse(0,0,p.size*.55,p.size,0,0,Math.PI*2);
        ctx.fillStyle=p.col;ctx.globalAlpha=.88;ctx.fill();ctx.restore();
      });
      _prvRaf=requestAnimationFrame(draw);
    })();
  }
}

function renderThemeSwatches(activeKey){
  const grid = document.getElementById('themeGrid');
  if(!grid) return;
  const owned = state.shopOwned || [];
  grid.innerHTML = Object.entries(THEMES).map(([key,t])=>{
    const isPremium = PREMIUM_THEME_KEYS.includes(key);
    const isAccessible = !isPremium || owned.includes(`theme_${key}`);
    const isActive = key === activeKey;
    if(!isAccessible){
      const price = SHOP_ITEMS.find(i=>i.themeKey===key)?.price||0;
      return `<div class="theme-swatch" style="background:${t.bg};opacity:0.35;cursor:not-allowed;" title="Купи в Крамниці за ${price} coins">
        <div class="sw-bar" style="background:${t.surface}"></div>
        <div class="sw-name" style="color:var(--text-faint);font-size:8px;display:flex;align-items:center;justify-content:center;gap:3px;">${ico('lock',9)} ${price}</div>
      </div>`;
    }
    return `<div class="theme-swatch ${isActive?'active':''}"
      style="background:${t.bg};border-color:${isActive?t.gold:'transparent'}"
      onclick="pickTheme('${key}')">
      <div class="sw-bar" style="background:linear-gradient(135deg,${t.surface} 50%,${t.gold} 50%)"></div>
      <div class="sw-name" style="color:${t.gold};font-size:9px">${t.name}</div>
    </div>`;
  }).join('');
}

function pickTheme(key){
  if(PREMIUM_THEME_KEYS.includes(key) && !(state.shopOwned||[]).includes(`theme_${key}`)) return;
  pickedTheme = key;
  applyTheme(key);
  renderThemeSwatches(key);
}

function friendlyAuthError(error){
  const m = (error && error.message || '').toLowerCase();
  if(m.includes('already registered') || m.includes('already exists')) return 'Цей email вже зареєстровано — спробуй увійти';
  if(m.includes('invalid login') || m.includes('invalid credentials')) return 'Неправильний email або пароль';
  if(m.includes('password') && m.includes('weak')) return 'Пароль занадто простий';
  if(m.includes('password') && m.includes('6')) return 'Пароль має бути не менше 6 символів';
  if(m.includes('database error') || m.includes('duplicate') || m.includes('unique')) return 'Технічна помилка під час створення акаунту — спробуй ще раз за хвилину';
  if(m.includes('rate limit') || m.includes('too many')) return 'Забагато спроб — зачекай хвилину і спробуй знову';
  if(m.includes('fetch') || m.includes('network') || m.includes('failed to fetch')){
    const inIframe = (function(){ try{ return window.self !== window.top; }catch(e){ return true; } })();
    return inIframe
      ? 'Запит блокується пісочницею прев\u02bcю — відкрий цей файл напряму в браузері (не у вбудованому перегляді), щоб реєстрація працювала'
      : 'Немає з\u02bcєднання з сервером — перевір інтернет';
  }
  if(m.includes('email') && m.includes('invalid')) return 'Невірний формат email';
  return error?.message || 'Сталася помилка, спробуй ще раз';
}

async function gateRegisterSubmit(){
  if(!sb){ gateMsg('Supabase не підключено'); return; }
  const email = document.getElementById('gateEmail').value.trim();
  const nickname = document.getElementById('gateNickname').value.trim();
  const password = document.getElementById('gatePassword').value;
  if(!email || !nickname || !password){ gateMsg('Заповни email, нік і пароль'); return; }
  if(password.length < 6){ gateMsg('Пароль має бути не менше 6 символів'); return; }
  if(nickname.length < 2){ gateMsg('Нік має бути не менше 2 символів'); return; }
  gateMsg('Створюємо акаунт…');
  let data, error;
  try{
    ({data, error} = await sb.auth.signUp({email, password, options:{data:{nickname}}}));
  }catch(e){ console.error('signUp threw', e); gateMsg(friendlyAuthError(e)); return; }
  if(error){ console.error('signUp error', error); gateMsg(friendlyAuthError(error)); return; }
  if(data.session){
    sbSession = data.session;
    await refreshOwnProfile();
    showGateSuccess(`Вітаємо, ${sbProfile?.nickname || nickname}!`);
  } else {
    gateMsg('Перевір пошту і підтверди email, потім увійди');
  }
}
async function gateLoginSubmit(){
  if(!sb){ gateMsg('Supabase не підключено'); return; }
  const email = document.getElementById('gateEmail').value.trim();
  const password = document.getElementById('gatePassword').value;
  if(!email || !password){ gateMsg('Введи email і пароль'); return; }
  gateMsg('Входимо…');
  let data, error;
  try{
    ({data, error} = await sb.auth.signInWithPassword({email, password}));
  }catch(e){ console.error('signIn threw', e); gateMsg(friendlyAuthError(e)); return; }
  if(error){ console.error('signIn error', error); gateMsg(friendlyAuthError(error)); return; }
  sbSession = data.session;
  await refreshOwnProfile();
  showGateSuccess(`З поверненням, ${sbProfile?.nickname || ''}!`.trim());
}

function showGateSuccess(text){
  const overlay = document.getElementById('gateSuccessOverlay');

  overlay.classList.add('show');
  fireConfetti();
  setTimeout(()=>{ overlay.classList.remove('show'); enterApp(); }, 1500);
}

async function restoreUserDataFromCloud(){
  if(!sb || !sbSession) return;
  try{
    const {data, error} = await sb.rpc('load_user_data');
    if(error || !data){ console.error('load_user_data failed', error); return; }
    const cats = data.categories || [];
    const quests = data.quests || [];
    const ustate = data.state || {};

    // Merge server categories: server is source of truth for XP, but keep
    // local categories if server has nothing (first run before any cloud save)
    if(cats.length){
      state.categories = cats.map(c=>({
        id: c.id, name: c.name, icon: c.icon||'star', color: c.color||'#E8A33D',
        xp: Number(c.xp)||0
      }));
    }
    if(quests.length){
      state.quests = quests.map(q=>({
        id: q.id, title: q.title, type: q.type||'daily',
        categoryId: q.category_id, xp: Number(q.xp)||20,
        streak: Number(q.streak)||0,
        lastDone: q.last_done||null, completed: q.completed||false
      }));
    }
    if(ustate){
      // Prefer profiles.coins (server-authoritative, updated by complete_goal)
      // over user_state.coins which is only updated when the client explicitly saves.
      const serverCoins = sbProfile?.coins ?? ustate.coins;
      if(serverCoins !== undefined) state.coins = Number(serverCoins)||0;
      if(ustate.theme) state.profile.theme = ustate.theme;
      if(Array.isArray(ustate.shop_owned)) state.shopOwned = ustate.shop_owned;
      if(ustate.shop_equipped) state.shopEquipped = ustate.shop_equipped;
      if(ustate.self_quest_log) state.selfQuestLog = ustate.self_quest_log;
    }
    if(sbProfile?.nickname) state.profile.nick = sbProfile.nickname;
    if(sbProfile?.avatar_data) state.profile.avatar = sbProfile.avatar_data;
    saveState();
    applyTheme(state.profile.theme || 'dark');
  }catch(e){ console.error('restoreUserDataFromCloud failed', e); }
}

async function syncProfileToCloud(){
  if(!sb || !sbSession) return;
  try{
    await sb.from('profiles').update({
      // coins NOT sent here — it lives in user_state (via pushUserDataToCloud)
      // and can be updated server-side by complete_goal; sending stale local
      // value here would overwrite bonuses awarded by the server.
      theme_key: state.profile?.theme||'dark',
      avatar_frame: state.shopEquipped?.frame||null, avatar_data: state.profile?.avatar||null,
      categories_json: (state.categories||[]).map(c=>({id:c.id, name:c.name, color:c.color})),
      updated_at: new Date().toISOString()
    }).eq('id', sbSession.user.id);
  }catch(e){ console.error('cloud sync failed', e); }
}

async function loadFriendsData(){
  if(!sb || !sbSession) return;
  const uid = sbSession.user.id;
  try{
    const [incomingRes, friendsA, friendsB, qIn, qOut, goalMembersRes, giftsRes] = await Promise.all([
      sb.from('friend_requests').select('id, created_at, from_profile:profiles!friend_requests_from_id_fkey(id,nickname,level,total_xp,streak,avatar_data,avatar_frame)').eq('to_id', uid).eq('status','pending'),
      sb.from('friends').select('profile:profiles!friends_friend_id_fkey(id,nickname,level,total_xp,streak,coins,avatar_data,avatar_frame)').eq('user_id', uid),
      sb.from('friends').select('profile:profiles!friends_user_id_fkey(id,nickname,level,total_xp,streak,coins,avatar_data,avatar_frame)').eq('friend_id', uid),
      sb.from('shared_quests').select('id,title,xp_reward,status,created_at,category_id,category_name,from_profile:profiles!shared_quests_from_id_fkey(nickname,avatar_data)').eq('to_id', uid).order('created_at',{ascending:false}),
      sb.from('shared_quests').select('id,title,xp_reward,status,created_at,category_id,category_name,to_profile:profiles!shared_quests_to_id_fkey(nickname,avatar_data)').eq('from_id', uid).order('created_at',{ascending:false}),
      sb.from('shared_goal_members').select('goal_id, contributed_xp').eq('user_id', uid),
      sb.from('gifts').select('id,item_id,item_name,coins,created_at,from_profile:profiles!gifts_from_id_fkey(nickname,avatar_data)').eq('to_id', uid).eq('claimed', false),
    ]);

    // Fetch goals separately by their IDs to avoid the RLS null-join bug:
    const goalIds = (goalMembersRes.data||[]).map(m=>m.goal_id).filter(Boolean);
    console.log('[goals debug] goalMembersRes:', goalMembersRes.data, 'error:', goalMembersRes.error);
    console.log('[goals debug] goalIds:', goalIds);
    let goalsData = [];
    if(goalIds.length){
      const {data: gd, error: ge} = await sb.from('shared_goals').select('id,title,target_xp,current_xp,created_by,status,completed_at').in('id', goalIds);
      console.log('[goals debug] shared_goals direct fetch:', gd, 'error:', ge);
      const contribs = {};
      (goalMembersRes.data||[]).forEach(m=>{ contribs[m.goal_id] = m.contributed_xp||0; });
      goalsData = (gd||[]).map(g=>({goal:g, contributed_xp: contribs[g.id]||0}));
    }
    console.log('[goals debug] goalsData:', goalsData);

    friendsData = {
      incoming: incomingRes.data || [],
      friends: [...(friendsA.data||[]).map(r=>r.profile), ...(friendsB.data||[]).map(r=>r.profile)].filter(Boolean),
      questsIn: (qIn.data||[]).filter(q=>q.status==='pending'),
      questsOut: qOut.data || [],
      goals: goalsData,
      giftsIn: giftsRes.data || [],
    };
    maybeShowGiftPopup();
  }catch(e){ console.error('loadFriendsData failed', e); }
}

     </p>`,

     <button class="btn btn-primary" id="cqSubmitBtn" onclick="submitCompleteQuest('${questId}')">${ico('check',14)} Зараховати</button>`);
}
let _completingQuest = false;
async function submitCompleteQuest(questId){
  if(_completingQuest) return;
  _completingQuest = true;
  const btn = document.getElementById('cqSubmitBtn');
  if(btn){ btn.disabled = true; btn.style.opacity = '.5'; }
  try{
    // Server-side atomic completion: only succeeds once per quest (closes
    // the double-click XP duplication exploit) and additionally enforces
    // a 150 XP / 24h cap on quest-sourced XP per account, which limits
    // how much a ring of fake "friend" accounts can inflate a level via
    // quest spam — this check can't be bypassed by calling the table
    // update directly since only this function is allowed to flip status.
    const {data, error} = await sb.rpc('complete_shared_quest', {p_quest_id: questId});
    if(error){
      console.error('complete quest failed', error);
      if((error.message||'').includes('daily_limit_exceeded')){
        showToast('Денний ліміт XP від квестів друзів вичерпано (150/24год) — спробуй завтра');
      } else if((error.message||'').includes('not found')){
        showToast('Цей квест уже зараховано раніше');
      } else {
        showToast('Помилка: '+error.message);
      }
      closeModal('dynamicModalOverlay');
      await loadFriendsData(); render();
      return;
    }
    const row = Array.isArray(data) ? data[0] : data;
    if(row){
      const catExists = state.categories.find(c=>c.id===row.category_id);
      if(catExists){
        addXP(row.category_id, row.xp_reward, 'Квест від друга');
      } else {
        // the category the sender picked was later deleted on this device —
        // credit it to the first available category as a safe fallback
        const fallback = state.categories[0];
        if(fallback) addXP(fallback.id, row.xp_reward, 'Квест від друга (сферу видалено, зараховано в '+fallback.name+')');
        else showToast(`+${row.xp_reward} XP не зараховано — немає жодної сфери`);
      }
    }
    closeModal('dynamicModalOverlay');
    await loadFriendsData(); render();
  } finally {
    _completingQuest = false;
  }
}
