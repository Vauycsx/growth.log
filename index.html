    `<button class="btn btn-ghost" onclick="closeModal('dynamicModalOverlay')">Скасувати</button>
     <button class="btn btn-primary" onclick="submitGift('${friendId}')">${ico('gem',14)} Надіслати</button>`);
}
async function submitGift(friendId){
  const coins = parseInt(document.getElementById('giftCoins').value)||0;
  const itemSel = document.getElementById('giftItem');
  const itemId = itemSel.value || null;
  const itemName = itemId ? (SHOP_ITEMS.find(it=>it.id===itemId)||{}).name : null;
  if(coins<=0 && !itemId){ showToast('Вибери монети або предмет'); return; }
  const {error} = await sb.rpc('send_gift', {p_to_id: friendId, p_item_id: itemId, p_item_name: itemName, p_coins: coins});
  if(error){ showToast('Помилка: '+error.message); return; }
  if(coins>0){ state.coins = (state.coins||0) - coins; saveState(); }
  closeModal('dynamicModalOverlay');
  showToast('Подарунок надіслано!');
  await syncProfileToCloud();
  render();
}

function openGiftItemModal(itemId){
  if(!sb || !sbSession){ showToast('Спочатку створи акаунт у Профілі'); return; }
  const item = SHOP_ITEMS.find(it=>it.id===itemId);
  if(!item){ return; }
  if(!friendsData.friends.length){ showToast('Спочатку додай друга у вкладці «Друзі»'); return; }
  if((state.coins||0) < item.price){ showToast('Недостатньо монет'); return; }
  const opts = friendsData.friends.map(f=>`<option value="${f.id}">${escapeHtml(f.nickname)}</option>`).join('');
  openDynamicModal(`${ico('gem',16)} Подарувати «${escapeHtml(item.name)}»`,
    `<p style="font-size:13px;color:var(--text-dim);margin-bottom:10px;">
       Спишеться <b style="color:var(--gold);display:inline-flex;align-items:center;gap:3px;">${ico('coin',12)} ${item.price}</b> з твого рахунку.
       Сам предмет не з'явиться у тебе — лише у друга, якого обереш.
     </p>
     <div class="field"><label>Кому подарувати</label><select id="giftItemFriend">${opts}</select></div>`,
    `<button class="btn btn-ghost" onclick="closeModal('dynamicModalOverlay')">Скасувати</button>
     <button class="btn btn-primary" onclick="submitGiftItem('${item.id}')">${ico('gem',14)} Подарувати</button>`);
}
async function submitGiftItem(itemId){
  const item = SHOP_ITEMS.find(it=>it.id===itemId);
  const toId = document.getElementById('giftItemFriend').value;
  if(!item || !toId) return;
  if((state.coins||0) < item.price){ showToast('Недостатньо монет'); return; }
  const {error} = await sb.rpc('send_gift', {p_to_id: toId, p_item_id: item.id, p_item_name: item.name, p_coins: item.price});
  if(error){ showToast('Помилка: '+error.message); return; }
  state.coins = (state.coins||0) - item.price;
  saveState();
  closeModal('dynamicModalOverlay');
  showToast(`«${item.name}» подаровано!`);
  await syncProfileToCloud();
  render();
}

async function claimGift(giftId){
  const {data, error} = await sb.rpc('claim_gift', {p_gift_id: giftId});
  if(error){ console.error('claim_gift failed', error); showToast('Не вдалося забрати подарунок: '+error.message); return; }
  const row = Array.isArray(data) ? data[0] : data;
  if(row){
    if(row.coins>0){ state.coins=(state.coins||0)+row.coins; }
    if(row.item_id && !(state.shopOwned||[]).includes(row.item_id)){ state.shopOwned.push(row.item_id); }
    saveState();
  }
  showToast('Подарунок забрано!');
  closeModal('giftPopupOverlay');
  await loadFriendsData(); render();
}

async function declineGift(giftId){
  const {error} = await sb.rpc('decline_gift', {p_gift_id: giftId});
  if(error){ console.error('decline_gift failed', error); showToast('Не вдалося повернути подарунок: '+error.message); return; }
  showToast('Подарунок повернуто відправнику');
  closeModal('giftPopupOverlay');
  await loadFriendsData(); render();
}

let _giftPopupShownIds = new Set();
function maybeShowGiftPopup(){
  if(document.getElementById('giftPopupOverlay')?.classList.contains('show')) return;
  const next = (friendsData.giftsIn||[]).find(g=>!_giftPopupShownIds.has(g.id));
  if(!next) return;
  _giftPopupShownIds.add(next.id);
  showGiftPopup(next);
}
function showGiftPopup(g){
  let modal = document.getElementById('giftPopupOverlay');
  if(!modal){
    modal = document.createElement('div');
    modal.id = 'giftPopupOverlay';
    modal.className = 'overlay';
    document.body.appendChild(modal);
  }
  const fromNick = g.from_profile?.nickname || '?';
  modal.innerHTML = `<div class="modal gift-popup-card">
    <div class="gift-popup-burst">${ico('gem',46)}</div>
    <div class="gift-popup-title">Подарунок!</div>
    <div class="gift-popup-from">${bubble(fromNick,46)}<div style="text-align:left;"><b>${escapeHtml(fromNick)}</b><br><span style="font-size:12px;color:var(--text-faint);">надіслав(ла) тобі подарунок</span></div></div>
    <div class="gift-popup-contents">
      ${g.coins>0 ? `<div class="gift-popup-row">${ico('coin',16)} <b>${g.coins}</b> монет</div>` : ''}
      ${g.item_name ? `<div class="gift-popup-row">${ico('gem',16)} <b>${escapeHtml(g.item_name)}</b></div>` : ''}
    </div>
    <div class="modal-actions" style="justify-content:center;gap:10px;">
      <button class="btn btn-ghost" onclick="declineGift('${g.id}')">${ico('x',14)} Повернути</button>
      <button class="btn btn-primary" onclick="claimGift('${g.id}')">${ico('check',14)} Прийняти</button>
    </div>
  </div>`;
  modal.classList.add('show');
}

function nickColor(nick){
  const palette = ['#E8A33D','#45D6B0','#9B8CFB','#FF8B6B','#5AA9FF','#FF7AC6','#7FE085','#F2C94C'];
  let h = 0; for(let i=0;i<(nick||'').length;i++) h = (h*31 + nick.charCodeAt(i)) % palette.length;
  return palette[Math.abs(h)%palette.length];
}
function bubble(nick, size, avatarData, frameId){
  size = size||38;
  if(avatarData){
    const inner = `<img src="${avatarData}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" alt="">`;
    if(frameId) return `<div style="flex-shrink:0;">${buildAvatarFrame(frameId, size, inner)}</div>`;
    return `<div style="width:${size}px;height:${size}px;border-radius:50%;flex-shrink:0;overflow:hidden;border:2px solid var(--border);">${inner}</div>`;
  }
  const c = nickColor(nick||'?');
  return `<div style="width:${size}px;height:${size}px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;
    background:${c}22;border:2px solid ${c};color:${c};font-weight:800;font-family:var(--mono);font-size:${Math.round(size*.4)}px;">
    ${escapeHtml((nick||'?')[0].toUpperCase())}
  </div>`;
}

function renderFriends(){
  if(!sb){
    return `<div class="card"><div class="card-title">${ico('briefcase',16)} Друзі недоступні</div>
      <p style="font-size:13px;color:var(--text-dim);">Supabase не підключено.</p></div>`;
  }
  if(!sbSession){
    return `
    <div class="card" style="max-width:420px;margin:40px auto;text-align:center;padding:30px 24px;">
      <div style="width:56px;height:56px;border-radius:50%;background:var(--surface-2);border:1px solid var(--border);
        display:flex;align-items:center;justify-content:center;margin:0 auto 14px;color:var(--gold);">${ico('heart',26)}</div>
      <div style="font-weight:700;font-size:15px;margin-bottom:8px;">Потрібен акаунт</div>
      <p style="font-size:13px;color:var(--text-dim);margin-bottom:16px;line-height:1.5;">
        Щоб додавати друзів, дарувати предмети й змагатися прогресом — спочатку створи акаунт у Профілі.
      </p>
      <button class="btn btn-primary" onclick="openProfileModal()">${ico('user',15)} Відкрити профіль</button>
    </div>`;
  }

  const myLvl = calcLevel(totalXP(state));
  const myNick = sbProfile?.nickname || sbSession.user.email;
  const myAvatar = state.profile?.avatar || null;
  const myFrame = state.shopEquipped?.frame || null;

  // Prefer server-computed values (sbProfile) over local state —
  // this ensures the level shown to friends is the real DB-authoritative one,
  // even if local storage was cleared and not yet fully re-synced.
  const myStreakGlobal = sbProfile?.streak ?? calcStreak(state);
  const myTotalGlobal  = sbProfile?.total_xp ?? totalXP(state);
  const myLvlGlobal    = { level: sbProfile?.level ?? calcLevel(myTotalGlobal).level };

  const raceBar = (label, icoName, myVal, theirVal, color)=>{
    const max = Math.max(1, myVal, theirVal);
    const myPct = Math.min(100, myVal/max*100), theirPct = Math.min(100, theirVal/max*100);
    const leading = myVal===theirVal ? 'tie' : (myVal>theirVal ? 'me' : 'them');
    return `<div style="margin-bottom:10px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
        <span style="font-size:9px;font-family:var(--mono);color:var(--text-faint);text-transform:uppercase;letter-spacing:.05em;display:flex;align-items:center;gap:4px;">${ico(icoName,11)} ${label}</span>
      </div>
      <div style="position:relative;height:18px;">
        <div style="position:absolute;inset:0;background:var(--surface-3);border-radius:9px;overflow:hidden;display:flex;">
          <div style="width:${myPct}%;background:linear-gradient(90deg, ${color}88, ${color});transition:width .4s;"></div>
        </div>
        <div style="position:absolute;inset:0;background:transparent;display:flex;align-items:center;justify-content:flex-start;">
          <span style="font-size:10px;font-family:var(--mono);font-weight:800;color:${leading==='me'?'#fff':'var(--text)'};padding-left:7px;">${fmtXP(myVal)}</span>
        </div>
      </div>
      <div style="position:relative;height:18px;margin-top:3px;">
        <div style="position:absolute;inset:0;background:var(--surface-3);border-radius:9px;overflow:hidden;display:flex;justify-content:flex-end;">
          <div style="width:${theirPct}%;background:linear-gradient(270deg, ${color}88, ${color});transition:width .4s;"></div>
        </div>
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:flex-end;">
          <span style="font-size:10px;font-family:var(--mono);font-weight:800;color:${leading==='them'?'#fff':'var(--text)'};padding-right:7px;">${fmtXP(theirVal)}</span>
        </div>
      </div>
    </div>`;
  };

  const friendsCards = friendsData.friends.map(f=>{
    const theirStreak = f.streak||0;
    const sharedStreak = Math.min(myStreakGlobal, theirStreak);
    const theirLvl = f.level||1;
    const leaderIsMe = myTotalGlobal >= (f.total_xp||0);
    const xpDiff = Math.abs(myTotalGlobal - (f.total_xp||0));
    const sharedGoals = friendsData.goals.filter(g=>g.goal&&g.goal.status==='active');
    const sharedGoalsDone = friendsData.goals.filter(g=>g.goal&&g.goal.status==='completed');
    return `
    <div class="card friend-widget" style="margin-bottom:14px;">
      <div class="friend-vs-row">
        <div class="friend-vs-side">
          ${bubble(myNick, 48, myAvatar, myFrame)}
          <div class="friend-vs-lvchip" style="background:var(--gold)1a;border-color:var(--gold)44;color:var(--gold);">Lv.${myLvlGlobal.level}</div>
        </div>
        <div class="friend-vs-mid">
          <div class="friend-vs-streak ${sharedStreak>0?'lit':''}">
            ${ico('flame',16)}
            <span>${sharedStreak}</span>
          </div>
          <div class="friend-vs-mid-label">спільний стрік</div>
        </div>
        <div class="friend-vs-side">
          ${bubble(f.nickname, 48, f.avatar_data, f.avatar_frame)}
          <div class="friend-vs-lvchip" style="background:var(--violet)1a;border-color:var(--violet)44;color:var(--violet);">Lv.${theirLvl}</div>
        </div>
      </div>
      <div style="text-align:center;font-weight:700;font-size:14px;margin:10px 0 14px;">${escapeHtml(f.nickname)}</div>

      <div class="friend-widget-stats">
        ${raceBar('XP', 'star', myTotalGlobal, f.total_xp||0, 'var(--gold)')}
        ${raceBar('Стрік', 'activity', myStreakGlobal, theirStreak, 'var(--violet)')}
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:4px;">
          <div style="text-align:center;background:var(--surface-3);border-radius:8px;padding:7px 0;">
            <div style="font-size:14px;font-weight:800;font-family:var(--mono);color:${leaderIsMe?'var(--gold)':'var(--violet)'};">
              ${leaderIsMe?'↑':'↓'}${fmtXP(xpDiff)}
            </div>
            <div style="font-size:9px;color:var(--text-faint);font-family:var(--mono);">різниця XP</div>
          </div>
          <div style="text-align:center;background:var(--surface-3);border-radius:8px;padding:7px 0;">
            <div style="font-size:14px;font-weight:800;font-family:var(--mono);color:var(--teal);">${sharedGoals.length}</div>
            <div style="font-size:9px;color:var(--text-faint);font-family:var(--mono);">цілей разом</div>
          </div>
          <div style="text-align:center;background:var(--surface-3);border-radius:8px;padding:7px 0;">
            <div style="font-size:14px;font-weight:800;font-family:var(--mono);color:var(--gold);">${sharedGoalsDone.length}</div>
            <div style="font-size:9px;color:var(--text-faint);font-family:var(--mono);">завершено</div>
          </div>
        </div>
      </div>

      <div class="fab-row">
        <button class="btn btn-sm" onclick="openFriendProfile('${f.id}','${escapeHtml(f.nickname)}')">${ico('user',13)} Профіль</button>
        <button class="btn btn-sm" onclick="openAssignQuestModal('${f.id}','${escapeHtml(f.nickname)}')">${ico('flag',13)} Квест</button>
        <button class="btn btn-sm" onclick="openGiftModal('${f.id}','${escapeHtml(f.nickname)}')">${ico('gem',13)} Подарувати</button>
        <button class="btn btn-sm btn-danger" onclick="removeFriend('${f.id}')">${ico('x',13)} Прибрати</button>
      </div>
    </div>`;
  }).join('') || `<div class="card" style="text-align:center;padding:24px;color:var(--text-faint);font-size:13px;">
      ${ico('heart',24)}<div style="margin-top:8px;">Ще немає друзів — знайди когось вище ↑</div>
    </div>`;

  const incomingHtml = friendsData.incoming.map(r=>`
    <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);">
      ${bubble(r.from_profile?.nickname,30,r.from_profile?.avatar_data,r.from_profile?.avatar_frame)}
      <div style="flex:1;font-size:13px;">${escapeHtml(r.from_profile?.nickname||'?')} <span style="color:var(--text-faint);font-size:11px;">хоче дружити</span></div>
      <button class="btn btn-primary btn-sm" onclick="acceptFriendRequest('${r.id}')" title="Прийняти">${ico('check',13)}</button>
      <button class="btn btn-sm" onclick="declineFriendRequest('${r.id}')" title="Відхилити">${ico('x',13)}</button>
    </div>`).join('');

  const searchHtml = friendSearchResults.map(p=>`
    <div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);">
      ${bubble(p.nickname,30,p.avatar_data,p.avatar_frame)}
      <div style="flex:1;font-size:13px;">${escapeHtml(p.nickname)} <span style="color:var(--text-faint);font-size:11px;font-family:var(--mono);">Lv.${p.level}</span></div>
      <button class="btn btn-primary btn-sm" onclick="sendFriendRequest('${p.id}')">${ico('plus',13)} Додати</button>
    </div>`).join('');

  const giftsHtml = friendsData.giftsIn.map(g=>`
    <div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);">
      ${bubble(g.from_profile?.nickname,30,g.from_profile?.avatar_data)}
      <div style="flex:1;font-size:13px;">від <b>${escapeHtml(g.from_profile?.nickname||'?')}</b>: ${g.coins>0?`+${g.coins} монет`:''}${g.item_name?` · ${escapeHtml(g.item_name)}`:''}</div>
      <button class="btn btn-primary btn-sm" onclick="claimGift('${g.id}')">${ico('gem',13)} Забрати</button>
    </div>`).join('');

  const activeGoals = friendsData.goals.filter(g=>g.goal && g.goal.status !== 'cancelled');
  const goalsHtml = activeGoals.length ? activeGoals.map(g=>{
    const goal = g.goal; if(!goal) return '';
    const pct = Math.min(100, Math.round(goal.current_xp / goal.target_xp * 100));
    const done = goal.status === 'completed';
    const cancelled = goal.status === 'cancelled';
    const barColor = done ? 'var(--teal)' : cancelled ? 'var(--border)' : 'var(--gold)';
    const statusChip = done
      ? `<span style="font-size:10px;font-family:var(--mono);color:var(--teal);background:var(--teal)18;border:1px solid var(--teal)44;border-radius:6px;padding:2px 8px;">✓ виконано</span>`
      : cancelled
      ? `<span style="font-size:10px;font-family:var(--mono);color:var(--text-faint);background:var(--surface-3);border:1px solid var(--border);border-radius:6px;padding:2px 8px;">скасовано</span>`
      : `<span style="font-size:10px;font-family:var(--mono);color:var(--gold);background:var(--gold)18;border:1px solid var(--gold)44;border-radius:6px;padding:2px 8px;">у процесі</span>`;
    return `<div class="card" style="margin-bottom:10px;${done?'border-color:var(--teal)33;':cancelled?'opacity:.6;':''}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <div style="font-size:13px;font-weight:700;flex:1;padding-right:8px;">${escapeHtml(goal.title)}</div>
        ${statusChip}
      </div>
      <div style="display:flex;justify-content:space-between;font-size:11px;font-family:var(--mono);color:var(--text-faint);margin-bottom:5px;">
        <span>${fmtXP(Math.min(goal.current_xp, goal.target_xp))} / ${fmtXP(goal.target_xp)} XP</span>
        <span>${pct}%</span>
      </div>
      <div style="height:10px;background:var(--surface-3);border-radius:5px;overflow:hidden;margin-bottom:${done?'8':'10'}px;">
        <div style="width:${pct}%;height:100%;background:${barColor};border-radius:5px;transition:width .4s;${done?'box-shadow:0 0 6px var(--teal)66;':''}"></div>
      </div>
      ${done ? `<div style="font-size:12px;color:var(--teal);text-align:center;padding:4px 0;font-family:var(--mono);">${ico('star',13)} Ціль досягнута! +50 монет кожному учаснику</div>` : ''}
      ${!done && !cancelled ? (() => {
        const isCreator = goal.created_by === sbSession?.user?.id;
        const autoCompleted = goal.current_xp >= goal.target_xp;
        if(autoCompleted){
          // Should have been marked done by server — show as done visually
          return `<div style="font-size:12px;color:var(--teal);text-align:center;padding:4px 0;font-family:var(--mono);">${ico('star',13)} Ціль досягнута! Сервер нарахує бонус автоматично</div>`;
        }
        return `<div style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-faint);">${ico('activity',12)} XP додається автоматично коли ти тренуєшся
          ${isCreator
            ? `<button class="btn btn-sm btn-danger" style="margin-left:auto;font-size:10px;" onclick="cancelGoal('${goal.id}')">${ico('x',10)} Скасувати</button>`
            : `<button class="btn btn-sm" style="margin-left:auto;font-size:10px;color:var(--text-faint);" onclick="leaveGoal('${goal.id}')">${ico('x',10)} Вийти</button>`
          }
        </div>`;
      })() : ''}
      ${cancelled && goal.created_by === sbSession?.user?.id ? `<div style="font-size:11px;color:var(--text-faint);text-align:center;">Ти скасував цю ціль</div>` : ''}
    </div>`;
  }).join('') : `<div class="card" style="text-align:center;padding:20px;color:var(--text-faint);font-size:12px;">Ще немає спільних цілей</div>`;

  return `
    <div class="card" style="margin-bottom:16px;display:flex;align-items:center;gap:12px;">
      ${bubble(myNick, 44, myAvatar, myFrame)}
      <div style="flex:1;">
        <div style="font-weight:700;font-size:15px;">${escapeHtml(myNick)}</div>
        <div style="font-size:11px;color:var(--text-faint);font-family:var(--mono);">Lv.${myLvl.level} · ${fmtXP(totalXP(state))} XP · стрік ${calcStreak(state)}</div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="sbLogoutSubmit()">${ico('x',13)} Вийти</button>
    </div>

    <div class="card" style="margin-bottom:16px;">
      <div class="card-title">${ico('target',16)} Знайти друзів</div>
      <div class="fab-row">
        <input type="text" id="friendSearchInput" placeholder="нік друга..." style="flex:1;">
        <button class="btn btn-primary btn-sm" onclick="searchFriendsByNickname()">${ico('target',13)} Шукати</button>
      </div>
      ${searchHtml ? `<div style="margin-top:10px;">${searchHtml}</div>` : ''}
    </div>

    ${friendsData.incoming.length ? `<div class="card" style="margin-bottom:16px;">
      <div class="card-title">${ico('inbox',16)} Заявки в друзі</div>${incomingHtml}
    </div>` : ''}

    ${friendsData.giftsIn.length ? `<div class="card" style="margin-bottom:16px;">
      <div class="card-title">${ico('gem',16)} Подарунки</div>${giftsHtml}
    </div>` : ''}

    <div class="section-head"><h2>${ico('heart',18)} Друзі</h2></div>
    ${friendsCards}

    <div class="section-head"><h2>${ico('target',18)} Спільні цілі</h2><button class="btn btn-primary btn-sm" onclick="openCreateGoalModal()">${ico('plus',13)} Нова ціль</button></div>
    ${goalsHtml}
  `;
}


function withTimeout(promise, ms, fallbackValue){
  let timer;
  const timeout = new Promise((resolve)=>{ timer = setTimeout(()=>resolve(fallbackValue), ms); });
  return Promise.race([promise, timeout]).finally(()=>clearTimeout(timer));
}

async function init(){
  try{
    await loadState();
    applyTheme(state.profile?.theme || 'dark');
    checkAchievements();
    setInterval(tickTimer, 1000);
    setInterval(()=>{
      if((activeTab==='friends'||activeTab==='quests') && sb && sbSession){
        loadFriendsData().then(()=>{ if(activeTab==='friends'||activeTab==='quests') render(); });
      }
    }, 8000);

    if(!sb){
      // Supabase unavailable — fail open rather than permanently lock the app out
      document.getElementById('app').style.display='block';
      render();
      return;
    }

    try{
      const {data} = await withTimeout(sb.auth.getSession(), 8000, {data:{session:null}});
      sbSession = data.session || null;
    }catch(e){ console.error('supabase getSession failed', e); sbSession = null; }

    if(sbSession){
      try{ await withTimeout(refreshOwnProfile(), 8000, null); }catch(e){ console.error('refreshOwnProfile failed', e); }
      document.getElementById('app').style.display='block';
      render();
      afterAuthChanged().catch(e=>console.error('afterAuthChanged failed', e));
    } else {
      renderGateForm();
      document.getElementById('authGate').style.display='flex';
      startGateBgAnim();
    }

    sb.auth.onAuthStateChange((_event, session)=>{
      const wasLoggedIn = !!sbSession;
      sbSession = session;
      if(!session && wasLoggedIn) exitToGate();
    });
  }catch(e){
    // Last-resort safety net: never leave the page stuck on the loading screen.
    console.error('init failed, opening in local mode', e);
    const app = document.getElementById('app');
    const gate = document.getElementById('authGate');
    if(gate) gate.style.display='none';
    if(app){ app.style.display='block'; try{ render(); }catch(e2){ console.error('render failed', e2); } }
  }finally{
    const ls = document.getElementById('loadingScreen');
    if(ls) ls.style.display='none';
  }
}
init();

/* ===== PWA: install prompt ===== */
let deferredInstallPrompt = null;
window.addEventListener('beforeinstallprompt', (e)=>{
  e.preventDefault();
  deferredInstallPrompt = e;
  const pill = document.getElementById('installPill');
  if(pill) pill.classList.add('show');
});
window.addEventListener('appinstalled', ()=>{
  deferredInstallPrompt = null;
  const pill = document.getElementById('installPill');
  if(pill) pill.classList.remove('show');
});
async function triggerInstall(){
  if(!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  await deferredInstallPrompt.userChoice;
  deferredInstallPrompt = null;
  const pill = document.getElementById('installPill');
  if(pill) pill.classList.remove('show');
}

/* ===== PWA: service worker (offline app-shell cache) =====
   Registered from a real file (./sw.js), not a Blob URL: Android's
   installability/WebAPK check fetches the SW script and manifest
   independently and cannot resolve blob: URLs, which silently
   blocked "Add to Home screen" on Android while working fine on desktop. */
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('./sw.js').catch(()=>{ /* offline caching unavailable, app still works online */ });
  });
}
</script>
